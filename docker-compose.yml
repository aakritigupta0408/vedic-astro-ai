version: "3.9"

services:
  mongo:
    image: mongo:7.0
    container_name: vedic_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vedic_astro

  redis:
    image: redis:7.2-alpine
    container_name: vedic_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

  app:
    build: .
    container_name: vedic_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - redis
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./src:/app/src

volumes:
  mongo_data:
  redis_data:
